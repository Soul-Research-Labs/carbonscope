# DEPRECATED: Use external-secrets.yaml with the External Secrets Operator instead.
# This file is kept as a local development/testing fallback only.
# For production, apply external-secrets.yaml which pulls secrets from Vault/AWS SM.
#
# Secrets template — fill in real base64-encoded values before applying.
# Generate values: echo -n "your-value" | base64
# NEVER commit real secrets to version control.
apiVersion: v1
kind: Secret
metadata:
  name: carbonscope-secrets
  namespace: carbonscope
type: Opaque
data:
  # echo -n "your-64-char-secret-key" | base64
  SECRET_KEY: REPLACE_ME_BASE64_ENCODED
  # echo -n "strong-random-password" | base64
  POSTGRES_PASSWORD: REPLACE_ME_BASE64_ENCODED
  # Optional — leave empty or remove if not using Stripe
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  # Optional — SMTP credentials
  SMTP_PASSWORD: ""
  # Optional — Sentry DSN
  SENTRY_DSN: ""
  # echo -n "your-32-char-totp-key" | base64
  TOTP_ENCRYPTION_KEY: REPLACE_ME_BASE64_ENCODED
