# ConfigMap for non-secret environment configuration.
# Secret values (SECRET_KEY, POSTGRES_PASSWORD, etc.) must be
# stored in the companion Secret resource — see secrets.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: carbonscope-config
  namespace: carbonscope
data:
  ENV: "production"
  LOG_LEVEL: "INFO"
  LOG_JSON: "true"
  ALLOWED_ORIGINS: "https://carbonscope.io"
  RATE_LIMIT_AUTH: "10/minute"
  RATE_LIMIT_DEFAULT: "60/minute"
  COOKIE_SECURE: "true"
  EMAIL_FROM: "noreply@carbonscope.io"
  ESTIMATION_MODE: "local"
  # IMPORTANT: Change to "finney" for Bittensor mainnet deployment.
  # "test" is the testnet — only use for staging/dev clusters.
  BT_NETWORK: "finney"
  BT_NETUID: "1"
  REDIS_URL: "redis://redis:6379/0"
  # Optional: S3 bucket for offsite backup replication (leave empty to skip)
  BACKUP_S3_BUCKET: ""
  # ── Observability ──────────────────────────────────────────────────
  # Sentry DSN for error tracking (leave empty to disable)
  SENTRY_DSN: ""
  # OpenTelemetry collector endpoint for distributed tracing
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  OTEL_SERVICE_NAME: "carbonscope-api"
