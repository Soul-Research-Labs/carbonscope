apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: carbonscope
  labels:
    app: carbonscope
    component: backup
spec:
  schedule: "0 2 * * *" # 02:00 UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: carbonscope
            component: backup
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            fsGroup: 70
          containers:
            - name: pg-backup
              image: postgres:16-alpine
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              env:
                - name: PGHOST
                  value: postgres
                - name: PGUSER
                  value: carbonscope
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: carbonscope-secrets
                      key: POSTGRES_PASSWORD
                - name: PGDATABASE
                  value: carbonscope
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: carbonscope-config
                      key: BACKUP_S3_BUCKET
                      optional: true
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  STAMP=$(date +%Y%m%d-%H%M%S)
                  DEST="/backups/carbonscope_${STAMP}.dump.gz"
                  echo "Starting backup → ${DEST}"
                  pg_dump -Fc | gzip > "${DEST}"
                  # Integrity check — verify gzip is valid and file is non-empty
                  test -s "${DEST}"
                  gzip -t "${DEST}"
                  SIZE=$(du -h "${DEST}" | cut -f1)
                  echo "Backup complete (${SIZE})"
                  # Optional: replicate to S3 for offsite durability
                  if [ -n "${S3_BUCKET:-}" ]; then
                    echo "Uploading to s3://${S3_BUCKET}/backups/"
                    aws s3 cp "${DEST}" "s3://${S3_BUCKET}/backups/carbonscope_${STAMP}.dump.gz" \
                      --storage-class STANDARD_IA
                    echo "S3 upload complete"
                  fi
                  # Prune local backups older than 30 days
                  find /backups -name '*.dump.gz' -mtime +30 -delete
              volumeMounts:
                - name: backups
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: postgres-backups
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backups
  namespace: carbonscope
  labels:
    app: carbonscope
    component: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
